services:
  syncthing-ts:
    image: tailscale/tailscale:latest
    container_name: syncthing-ts
    hostname: syncthing
    environment:
      - TS_AUTHKEY=$(TS_AUTHKEY)
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/syncthing.json
      - TS_USERSPACE=true
    volumes:
      - /srv/docker/syncthing/ts-config:/config
      - /srv/docker/syncthing/ts-state:/var/lib/tailscale
    restart: unless-stopped

  syncthing:
    image: syncthing/syncthing
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data:/var/syncthing
      - /home/marthynas/sambashare/personal/org:/org-sync
    network_mode: service:syncthing-ts
    restart: unless-stopped
